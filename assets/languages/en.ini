; ============================================================
; Player Options help text
; ============================================================
[PlayerOptionsHelp]
TypeOfSpeedModHelp=Change the way arrows react to changing BPMs.
SpeedModHelp=Adjust the speed at which arrows travel toward the targets.
NoCmodAlternativeHelp=When a chart is tagged "no CMod", auto-switch from CMod to this mod type for that play only.
MiniHelp=Change the size of your arrows.
SpacingHelp=Adjust the horizontal gap between note columns.
PerspectiveHelp=Change the viewing angle of the arrow stream.
NoteSkinHelp=Change the appearance of the arrows.
MineSkinHelp=Change mine graphics independently from the main noteskin.
ReceptorSkinHelp=Change receptor graphics independently from the main noteskin.
TapExplosionSkinHelp=Change tap explosion graphics independently from the main noteskin.
TapExplosionOptionsHelp=Choose which tap, held, and active hold/roll explosions can flash the receptors.
JudgmentFontHelp=Pick your judgment font.
JudgmentOffsetXHelp=Adjust the horizontal position of the judgment display.
JudgmentOffsetYHelp=Adjust the vertical position of the judgment display.
ComboFontHelp=Choose the font to count your combo. This font will also be used\nfor the Measure Counter if that is enabled.
ComboOffsetXHelp=Adjust the horizontal position of the combo counter.
ComboOffsetYHelp=Adjust the vertical position of the combo counter.
HoldJudgmentHelp=Change the judgment graphics displayed for hold notes.
HeldGraphicHelp=Pick a graphic to appear over a column to indicate a held miss.
BackgroundFilterHelp=Darken the underside of the playing field.\nThis will partially obscure background art.
NoteFieldOffsetXHelp=Adjust the horizontal position of the notefield (relative to the\ncenter).
NoteFieldOffsetYHelp=Adjust the vertical position of the notefield.
VisualDelayHelp=Player specific visual delay. Negative values shifts the arrows\nupwards, while positive values move them down.
GlobalOffsetShiftHelp=Player specific timing shift added on top of the machine global\noffset. Use this for controller-specific latency differences.
MusicRateHelp=Change the native speed of the music itself.
StepchartHelp=Choose the stepchart you wish to play.
WhatComesNextHelp=Go back and choose a different chart or change additional\nmodifiers.
StepStatisticsHelp=Choose which Step Statistics widgets appear during gameplay.
StepStatsExtraHelp=Choose the beat-synced animation shown in the Step Statistics pane.
TargetScoreMissPolicyHelp=Decide what happens if you fall behind your target score.
MiniIndicatorHelp=Display subtractive, predictive, paced, rival, or stream-progress\nmini indicator on-screen.
MiniIndicatorSubtractiveDisplayHelp=Choose whether subtractive scoring shows percent loss or integer point loss.
MiniIndicatorSizeHelp=Choose the mini indicator text size.
MiniIndicatorColorHelp=Choose the mini indicator score color style.
MiniIndicatorPositionHelp=Choose the mini indicator placement.
ComboColorModeHelp=Choose whether combo colors use full combo or current combo.
LifeBarOptionsHelp=Adjust the aesthetics of the lifebar display.
TimingWindowsHelp=Disable certain Timing Windows at your discretion.
ResultsExtrasHelp=Show early-hit subtotals on evaluation, and clamp the scatter\nplot's vertical scale to a Great cap and Fantastic floor.
ScatterplotMaxWindowHelp=Force the evaluation scatter plot to zoom no further out\nthan the chosen judgment window. Overrides Scale Scatterplot\nwhen set; Off keeps the autoscale behavior.
TurnHelp=Apply simple transforms to the arrow directions.
ScrollHelp=Change how notes scroll relative to the receptors.
HideHelp=Hide parts of the gameplay UI.
LifeMeterTypeHelp=Change the style of the lifebar.
DensityGraphBackgroundHelp=Choose solid or transparent gameplay density graph background.
SmxFsrDisplayHelp=Live sensor pressure overlay during gameplay. For debugging only; activates sensor test mode on the pad, which adds up to ~6ms of input latency.\nDefault is No.
SmxPadInputDisplayHelp=Live pad input overlay showing which panels are pressed during gameplay.\nDefault is No.
TargetScoreHelp=Choose a grade or score to chase.
IndicatorScoreTypeHelp=Choose which score formula the mini indicator tracks:\nITG, EX (FA+), or H.EX (Hard EX).
GameplayExtrasHelp=Extra feedback helpers shown during gameplay.
ScorePositionHelp=Choose whether gameplay score stays in the header or moves into the Step Statistics pane.
ScoreDisplayHelp=Choose whether gameplay score shows current percent or predictive percent remaining from 100.00.
ColumnFlashJudgmentsHelp=Choose which judgments trigger lane column flashes during gameplay.
ColumnFlashBrightnessHelp=Choose original Simply Love column flash opacity or Chris-style dimmer flashes.
ColumnFlashSizeHelp=Choose original full-height column flashes or Chris-style compact flashes.
LiveTimingStatsHelp=Choose which live timing error stats are shown during gameplay.
CrossoverCuesHelp=Flash a notefield column shortly before an upcoming crossover so you can pre-position your foot. Turn on to reveal its options.
CrossoverCueDurationHelp=How long before the crossover the cue starts flashing, in milliseconds.
CrossoverCueQuantizationHelp=Only cue crossovers in streams at least this dense (higher = tighter spacing required).
CrossoverCueBracketsHelp=Whether bracket (multi-panel) crossovers also get a cue. Exclude matches the default behavior.
ComboColorsHelp=Choose whether to show combo color by glowing, solid color, rainbow,\nor none.
CarryComboHelp=Carry current combo into the next song.
JudgmentTiltHelp=Toggle left/right tilt for judgment sprites.
JudgmentTiltIntensityHelp=How strongly to tilt judgments left/right.
JudgmentTiltMinThresholdHelp=Judgments within this many milliseconds do not tilt.
JudgmentTiltMaxThresholdHelp=Judgment tilt stops increasing after this many milliseconds.
JudgmentBehindArrowsHelp=Render judgment text, offset indicator, and error bar behind arrows.
OffsetIndicatorHelp=Show zmod-style per-tap offset text (e.g. -4.52ms).
ErrorBarHelp=Toggle Colorful/Monochrome bars and Text early/late indicator.
TextErrorBarModeHelp=Choose whether Text error bar timing uses the active judgment window or scalable FAST/SLOW text.
TextErrorBarThresholdHelp=Set the error in milliseconds where scalable FAST/SLOW text starts appearing and scaling.
ShortAverageErrorBarHelp=Show the short-term red Average error bar tick.
CenterTickHelp=Show the Average error bar's center reference tick.
AverageErrorBarIntensityHelp=Visually amplify the Average error bar tick so smaller average offsets are easier to see. Does not change scoring or timing math.
AverageErrorBarIntervalHelp=Set how many recent milliseconds are averaged for the Average error bar tick.
ErrorBarTrimHelp=Set the worst timing window that the error bar will show.
ErrorBarOptionsHelp=Adjust where the error bar appears and whether it shows multiple tick marks.
ErrorBarOffsetXHelp=Adjust the horizontal position of the error bar.
ErrorBarOffsetYHelp=Adjust the vertical position of the error bar.
LongErrorBarHelp=Show a second blue tick that averages your timing offsets over a longer window, helping you spot persistent drift.
LongErrorBarIntensityHelp=Visually amplify the long-term (blue) Average error bar tick so smaller drifts are easier to see. Does not change scoring or timing math.
LongErrorBarThresholdHelp=Minimum absolute long-term average error required before the long-term (blue) Average error bar tick is shown.
LongErrorBarMinSamplesHelp=Minimum number of valid offset samples that must be collected before the long-term (blue) Average error bar tick is shown.
MeasureCounterHelp=Display a count of how long you have been streaming a specific type of note.
MeasureCounterLookaheadHelp=Set how many upcoming stream/break segments are displayed by the measure counter.
MeasureCounterOptionsHelp=Change how the Measure Counter is positioned and which extra displays are enabled.
MeasureLinesHelp=Display horizontal lines on the notefield to indicate quantization.
RescoreEarlyHitsHelp=Allow early hits of Decents and Way Offs to be rescored to better judgments.
EarlyDecentWayOffOptionsHelp=Set how early Decent and Way Off judgments are visually represented.
FAPlusOptionsHelp=Toggle FA+ style timing window display and EX/H.EX scoring visuals.
FAPlusWindowOptionsHelp=Choose extra behavior for the FA+ timing window.
CustomBlueFantasticWindowHelp=Override the default FA+ blue Fantastic split with a custom window.
CustomBlueFantasticWindowMsHelp=Pick the blue Fantastic window size in milliseconds.
WhatComesNextAdvancedHelp=Jump to gameplay, another modifier pane,\nor back to the select screen.
InsertHelp=Add extra notes into the chart in unusual patterns.
RemoveHelp=Strip specific note types out of the chart.
HoldsHelp=Twist and reshape hold notes in strange ways.
AccelHelp=Time-based acceleration and deceleration effects.
EffectHelp=Wild motion applied to the note field.
AppearanceHelp=Fade or hide incoming arrows in unusual ways.
AttacksHelp=Toggle charts that include attack modifiers.
HideLightTypeHelp=Control how cabinet lights react during gameplay.
PadLightBrightnessHelp=Brightness of your StepManiaX pad lights, 0% (off) to 100%.\nApplies to judgement effects, hold and roll colours, and pad GIFs.
WhatComesNextHelp1=Jump to gameplay, another modifier pane,
WhatComesNextHelp2=or back to the select screen.

