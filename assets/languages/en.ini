[OptionsFoldersHelp]
DataDirHelp=Root folder for user data (config, saves, songs, courses, log). Backed up to preserve your settings.
CacheDirHelp=Regenerable cache (parsed songs, banners, downloads). Safe to delete; will be recreated on next launch.
SongsHelp=Default song scan root. Drop song packs here to make them visible in DeadSync.
CoursesHelp=Default course scan root. Drop course files here to make them visible in DeadSync.
ProfilesHelp=Per-player profiles: scores, settings, and GrooveStats credentials.
ScreenshotsHelp=Captured screenshots saved during gameplay.
LogFileHelp=deadsync.log - useful when reporting bugs. Selecting this row reveals the file in the parent folder.
ConfigFileHelp=deadsync.ini - main configuration file. Selecting this row reveals the file in the parent folder.
