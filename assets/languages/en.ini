OverscanAdjustmentHelp=Adjust the centering and scale of the rendered image to\ncompensate for TV/display overscan.

; ============================================================
; Options Help — Sound submenu
; ============================================================
[OptionsSoundHelp]
SoundDeviceHelp=Select an output device detected at startup.\nAuto uses the host default output device.\nWindows playback prefers native WASAPI.\nmacOS playback prefers native CoreAudio.\nFreeBSD playback prefers native PCM/OSS.\nLinux backend routing depends on Linux Audio Backend; ALSA exclusive routing is configured separately.\nChanging this takes effect on next launch.
AudioOutputModeHelp=Select whether audio output should use Auto or Shared mode.\nAuto keeps the backend default policy.\nShared forces shared-mode output where supported.\nExclusive mode is exposed separately when Linux Audio Backend is set to ALSA.\nChanging this takes effect on next launch.
LinuxAudioBackendHelp=Select which Linux backend to prefer.\nBackends shown in this menu depend on what this build includes.\nAuto prefers PipeWire first when available, then PulseAudio, and falls back to ALSA as needed.\nPipeWire and PulseAudio are shared-output backends and currently ignore explicit Sound Device selection.\nJACK is an explicit low-latency backend and currently ignores Sound Device selection.\nALSA is the direct Linux backend and exposes the child Exclusive Mode row.\nChanging this takes effect on next launch.
AlsaExclusiveHelp=Request ALSA exclusive output for the selected device.\nOff keeps ALSA in the normal shared path.\nOn requires a direct hw/plughw device or a resolvable hardware-backed alias.\nChanging this takes effect on next launch.
AudioSampleRateHelp=Select an audio output sample rate for the chosen Sound Device.
MasterVolumeHelp=Set the overall volume for all audio.
SfxVolumeHelp=Set the sound-effect volume before master volume is applied.
AssistTickVolumeHelp=Set the gameplay Assist Tick volume before master volume is applied.
MusicVolumeHelp=Set the music volume before master volume is applied.
MineSoundsHelp=Play a sound when mines are hit.
GlobalOffsetHelp=Apply a global audio timing offset in 1 ms steps.
RateModPreservesPitchHelp=Keep pitch constant when rate mods are active.
ReplayGainHelp=Experimental: normalize playback loudness across songs using ReplayGain 2.0 / EBU R 128. Loudness is computed in the background on first play and cached on disk; gain is applied to subsequent playback or live once analysis completes.

; ============================================================
; Options Help — Input submenu
; ============================================================
[OptionsInputHelp]
ConfigureMappingsHelp=Map keyboard keys, panels, menu buttons, etc. to game functions.
TestInputHelp=Test your dance pad/controller and menu buttons.\n\nIf one of your buttons is not mapped to a game function, it will appear here as "not mapped".
ConfigurePadsHelp=View and edit sensor thresholds on connected pads (StepManiaX, etc.). Pads show side by side; Left/Right pick a panel, Up/Down adjust its threshold. Edits are written straight to the pad.\nIf DeadSync Manages Pad Config is on, DeadSync will overwrite these edits (on launch, or when the active profile or pad changes), so save tunings as profiles from Song Select instead. With it off, your edits stay on the pad.
InputOptionsHelp=Open additional input settings.
GamepadBackendHelp=Choose gamepad input backend. On Windows Raw Input is the default path and WGI remains available as a compatibility fallback.\nChanging backend requires a restart.
SmxInputHelp=Enable native StepManiaX stage input via the RustManiaX SDK, connecting directly to the pads.\nChanging this requires a restart.\nDefault is No.
UseFSRsHelp=Enable direct FSR pad diagnostics and threshold editing on the Configure Pads screen. This reads supported pads directly instead of relying on the gameplay input backend.\nAlso reveals the StepManiaX settings page.\nDefault is No.
SmxConfigHelp=StepManiaX pad settings: enable StepManiaX input and pad-config management.\nShown when Use FSRs is enabled.
SmxManagesPadConfigHelp=Controls who owns your StepManiaX pad thresholds.\nOn: DeadSync writes thresholds to each pad (the pad's saved default profile, or the Default Pad Config preset if it has none) and re-applies them on launch and whenever the active profile or pad changes. Edits made in Configure Pads are temporary; save tunings as profiles from Song Select to keep them.\nOff: DeadSync never changes your pads. Edit them directly in Configure Pads and the values stay on the pad.\nDefault is No.
SmxPanelLightsHelp=Light each StepManiaX pad panel with your per-arrow judgement colour during gameplay, plus colours for freezes, rolls, and mine hits. While on, the game drives the panels, which overrides any custom animations loaded on the pad. Turn off to leave the pad's own lighting alone.\nDefault is No.
SmxUnderglowThemeHelp=Set the StepManiaX pad edge underglow LEDs to your theme colour. P1 pad uses the selected colour; P2 pad uses the paired offset colour. Applied on pad connect and whenever the theme colour changes.\nDefault is No.
DefaultPadConfigHelp=The built-in threshold preset (Low/Medium/High, matching the official StepManiaX tool) DeadSync uses as its default.\nDefault is Low.
SmxSinglePadPlayerHelp=With a single StepManiaX pad connected, choose whether it plays as Player 1 or Player 2, regardless of its hardware jumper. Pick Player 2 to play a lone stage on the P2 side.
SmxDefaultLightBrightnessHelp=Machine default for StepManiaX pad-light brightness, 0% (off) to 100%. Used to seed new player profiles; each player can then set their own value in Player Options.\nDefault is 100%.
SmxAssignPadsHelp=Choose which physical pad is Player 1 and which is Player 2 by stepping on each. Use this when both pads share the same P1/P2 jumper, or when the pads are installed on the wrong sides. The pads light blue (P1) and red (P2) so you can see the assignment.
SmxSwapPadsHelp=Instantly swap which pad is Player 1 and which is Player 2. Handy when the pads are jumpered correctly but installed on the wrong sides. Both pads must be connected.
DebugFsrDumpHelp=If you have FSRs, use this to create fsrdump.txt in your deadsync folder. Please send it to PerfectTaste so he can debug and implement support for more FSR I/O boards and firmware versions.
MenuButtonsHelp=Choose whether to allow using gameplay buttons (e.g. directional arrows) for menu navigation.\nUse Gameplay Buttons - Navigate through the game using your dance pad.\nOnly Dedicated Buttons - Navigate through the game using dedicated menu buttons.\nWhen enabled, some UI actions move from Select to a simultaneous Left+Right chord.\n\nOnly Dedicated Buttons requires at least one player to have menu buttons mapped before it can be selected.
OptionsNavigationHelp=Choose how Player Options style screens advance between rows.\nStepMania Style - Up/Down changes rows and Start jumps to Exit.\nArcade Style - Start advances to the next row and the active row shows a down-pointer indicator.
MenuNavigationHelp=Choose whether cabinet-style menu navigation expects five buttons or three buttons per player.\nFive Key Menu - Use MenuLeft, MenuRight, MenuUp, MenuDown, and Start.\nThree Key Menu - Use MenuLeft, MenuRight, and Start.\nFive Key Menu requires MenuUp, MenuDown, MenuLeft, and MenuRight for at least one player.\nThree Key Menu requires MenuLeft, MenuRight, and Start for at least one player.
DebounceHelp=Global per-input debounce window used across menus and gameplay for keyboard and all gamepad drivers.\nITGmania default is 20ms. 50ms was common on older arcade pads.

